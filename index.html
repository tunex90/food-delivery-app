<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="app.js"></script>
    <header>
        <h1>🍕 Local Food Delivery Auto-reply </h1>
        <h1>🍕 Local Food Delivery</h1>
        <p id="location">📍 Getting location...</p>
        <input type="search" placeholder="Search restaurants or dishes...">
    </header>
    
    <main>
        <section class="restaurants">
            <div class="card">
                <img src="https://via.placeholder.com/300x200/FF6B6B/fff?text=Pizza+Place" alt="Restaurant">
                <h3>Pizza Palace</h3>
                <p>⭐ 4.5 • 25-35 min • $2.99 delivery</p>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/300x200/4ECDC4/fff?text=Burger+Joint" alt="Restaurant">
                <h3>Burger Joint</h3>
                <p>⭐ 4.8 • 20-30 min • $1.99 delivery</p>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/300x200/FFE66D/333?text=Sushi+Bar" alt="Restaurant">
                <h3>Sushi Express</h3>
                <p>⭐ 4.6 • 30-40 min • $3.99 delivery</p>
            </div>
        </section>
    </main>
</body>
</html>
